
gatewayClass:
  create: true
  name: traefik
  controllerName: traefik.io/gateway-controller

gateway:
  enabled: true
  name: traefik-gateway
  listeners:
    - name: web
      protocol: HTTP
      # Must match Traefik web entryPoint (default 8000 in Helm chart).
      port: 8000
      allowedRoutesFrom: All

# External GKE Gateway (public entrypoint) -> Traefik service
edgeGateway:
  enabled: true
  namespace: default
  name: app-gateway
  className: gke-l7-global-external-managed

  tls:
    # Secret must exist in edgeGateway.namespace
    # You can create it with shell/create_tls_secret.sh
    secretName: linx-bar-tls

  route:
    name: edge-to-traefik
    # Optional hostnames for edge route, e.g. ["nodejs.linx.bar"]
    hostnames: []

  traefikService:
    # Leave empty to use Traefik service default name
    # (traefik.fullnameOverride if set, otherwise Helm release name)
    name: ""
    namespace: ""
    port: 80

  healthCheckPolicy:
    enabled: true
    name: traefik-service-hc
    requestPath: /ping
    portSpecification: USE_FIXED_PORT
    port: 8080
    checkIntervalSec: 5
    timeoutSec: 5
    healthyThreshold: 2
    unhealthyThreshold: 2

  # GKE Gateway LB backend policy for Traefik service
  backendPolicy:
    enabled: true
    # Optional override; default is "<traefik-service-name>-backend-policy"
    name: ""
    logging:
      enabled: false

# Optional: create an example HTTPRoute for smoke testing.
# Keep disabled in production and let app charts create their own routes.
exampleRoute:
  enabled: false
  name: whoami
  hostnames: []
  pathPrefix: /
  service:
    name: whoami
    port: 80

traefik:
  deployment:
    replicas: 4

  autoscaling:
    enabled: true
    minReplicas: 4
    maxReplicas: 12
    metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 60

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

  env:
    - name: TZ
      value: Asia/Taipei

  # Schedule Traefik to GKE core node pool by default.
  # Override these in your own values if node pool names differ.
  nodeSelector:
    workload: app

  tolerations: []

  affinity: {}

  service:
    type: ClusterIP

  providers:
    kubernetesGateway:
      enabled: true
    kubernetesCRD:
      enabled: true
    kubernetesIngress:
      enabled: false

  logs:
    access:
      enabled: true
      format: json
      fields:
        general:
          defaultMode: drop
          names:
            StartLocal: keep
            RequestHost: keep
            RequestMethod: keep
            RequestPath: keep
            RequestProtocol: keep
            DownstreamStatus: keep
            DownstreamContentSize: keep
            OriginDuration: keep
        headers:
          defaultMode: drop
          names:
            CF-Connecting-IP: keep
            User-Agent: keep
            Referer: keep

  additionalArguments:
    - --ping=true
    - --ping.entryPoint=traefik
    - --entryPoints.web.forwardedHeaders.insecure=true
    - --serversTransport.maxIdleConnsPerHost=800
    - --serversTransport.forwardingTimeouts.idleConnTimeout=90s
    - --serversTransport.forwardingTimeouts.responseHeaderTimeout=15s
