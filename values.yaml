namespace:
  create: true

gatewayClass:
  create: true
  name: traefik
  controllerName: traefik.io/gateway-controller

gateway:
  enabled: true
  name: traefik-gateway
  listeners:
    - name: web
      protocol: HTTP
      # Must match Traefik web entryPoint (default 8000 in Helm chart).
      port: 8000
      allowedRoutesFrom: All

# External GKE Gateway (public entrypoint) -> Traefik service
edgeGateway:
  enabled: true
  namespace: default
  name: app-gateway
  className: gke-l7-global-external-managed

  tls:
    # Secret must exist in edgeGateway.namespace
    # You can create it with shell/create_tls_secret.sh
    secretName: linx-bar-tls

  route:
    name: edge-to-traefik
    # Optional hostnames for edge route, e.g. ["nodejs.linx.bar"]
    hostnames: []

  traefikService:
    # Leave empty to use Traefik service default name
    # (traefik.fullnameOverride if set, otherwise Helm release name)
    name: ""
    namespace: ""
    port: 80

  healthCheckPolicy:
    enabled: true
    name: traefik-service-hc
    requestPath: /ping
    portSpecification: USE_FIXED_PORT
    port: 8080
    checkIntervalSec: 5
    timeoutSec: 5
    healthyThreshold: 2
    unhealthyThreshold: 2

# Optional: create an example HTTPRoute for smoke testing.
# Keep disabled in production and let app charts create their own routes.
exampleRoute:
  enabled: false
  name: whoami
  hostnames: []
  pathPrefix: /
  service:
    name: whoami
    port: 80

traefik:
  deployment:
    replicas: 2

  env:
    - name: TZ
      value: Asia/Taipei

  # Schedule Traefik to GKE core node pool by default.
  # Override these in your own values if node pool names differ.
  nodeSelector:
    workload: system

  tolerations:
    - key: dedicated
      operator: Equal
      value: system
      effect: NoSchedule

  affinity: {}

  service:
    type: ClusterIP

  providers:
    kubernetesGateway:
      enabled: true
    kubernetesCRD:
      enabled: true
    kubernetesIngress:
      enabled: false

  logs:
    access:
      enabled: false

  additionalArguments:
    - --ping=true
    - --ping.entryPoint=traefik
    - --entryPoints.web.forwardedHeaders.insecure=true
    - --accesslog=true
    - --accesslog.format=json
    - --accesslog.fields.defaultmode=drop
    - --accesslog.fields.names.StartLocal=keep
    - --accesslog.fields.names.RequestHost=keep
    - --accesslog.fields.names.RequestMethod=keep
    - --accesslog.fields.names.RequestPath=keep
    - --accesslog.fields.names.RequestProtocol=keep
    - --accesslog.fields.names.DownstreamStatus=keep
    - --accesslog.fields.names.DownstreamContentSize=keep
    - --accesslog.fields.names.OriginDuration=keep
    - --accesslog.fields.headers.defaultmode=drop
    - --accesslog.fields.headers.names.CF-Connecting-IP=keep
    - --accesslog.fields.headers.names.User-Agent=keep
    - --accesslog.fields.headers.names.Referer=keep
